environment:
  sdk: '>=3.1.0 <4.0.0' # SDK нұсқасын тұрақты етіп қойдық

dependencies:
  flutter:
    sdk: flutter

  # Пакеттер бір деңгейде тұруы керек
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.5
  shared_preferences: ^2.5.4
